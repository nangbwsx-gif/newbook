services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: newbook
      POSTGRES_PASSWORD: newbook_pass
      POSTGRES_DB: newbook
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - newbook-net

  app:
    build: .
    restart: always
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"
    networks:
      - newbook-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - newbook-net

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres-data:
  uploads:
  certbot-www:
  certbot-certs:

networks:
  newbook-net:
