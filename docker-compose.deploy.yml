services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: newbook
      POSTGRES_PASSWORD: newbook_pass
      POSTGRES_DB: newbook
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newbook"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - newbook-net

  app:
    image: newbook-app:latest
    restart: always
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    expose:
      - "3000"
    networks:
      - newbook-net

  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks:
      - newbook-net

volumes:
  postgres-data:
  uploads:
  caddy-data:

networks:
  newbook-net:
